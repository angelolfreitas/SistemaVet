spring.application.name=vet


spring.datasource.url=jdbc:mysql://mysql-db:3306/clinica_veterinaria?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurações adicionais recomendadas para o Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

api.security.token.secret=${ALGORITHM_SECRET}
